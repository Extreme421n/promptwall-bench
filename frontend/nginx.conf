# Default site for the DemoCorp frontend image.
#
# Templated by nginx's official entrypoint (`/etc/nginx/templates/*.template`)
# so `${PORT}` resolves at container start to whatever the platform injects
# (Render / Railway / Fly all set this).

server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unmatched path serves index.html so React Router
    # (or any future client-side routing) works on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed bundle assets; index.html stays short
    # so deployments take effect immediately.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
